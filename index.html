<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>visionBird | Otonom QA Asistanı</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #38bdf8; font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; margin-bottom: 2rem; }
        .search-box { display: flex; width: 100%; max-width: 600px; gap: 10px; margin-bottom: 1rem; }
        input[type="text"] { flex: 1; padding: 1rem; border-radius: 8px; border: 1px solid #334155; background-color: #1e293b; color: white; font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: #38bdf8; }
        button { padding: 1rem 2rem; border-radius: 8px; border: none; background-color: #38bdf8; color: #0f172a; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0ea5e9; }
        button:disabled { background-color: #475569; cursor: not-allowed; }
        
        .toggle-container { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; width: 100%; max-width: 600px; }
        .toggle-container input { width: 18px; height: 18px; cursor: pointer; }
        .toggle-container label { color: #94a3b8; font-size: 0.95rem; cursor: pointer; user-select: none; }

        .result-container { width: 100%; max-width: 800px; background-color: #1e293b; padding: 2rem; border-radius: 12px; display: none; border: 1px solid #334155; }
        .report-text { white-space: pre-wrap; line-height: 1.6; color: #cbd5e1; background: #0f172a; padding: 1.5rem; border-radius: 8px; font-family: monospace; }
        .loader { display: none; color: #38bdf8; font-weight: bold; margin-bottom: 1rem; font-size: 1.2rem; }
    </style>
</head>
<body>

    <h1>🦅 visionBird</h1>
    <p>Otonom UI/UX Kalite Güvence Asistanı</p>

    <div class="search-box">
        <!-- URL Girişi: Enter tuşunu dinleyen event eklendi -->
        <input type="text" id="urlInput" placeholder="Test edilecek web sitesi URL'sini yapıştırın..." onkeydown="checkEnter(event)" />
        <button id="scanBtn" onclick="havalandir()">Havalandır 🚀</button>
    </div>

    <div class="toggle-container">
        <input type="checkbox" id="simSwitch">
        <label for="simSwitch">⚠️ Hata Simülasyonu Modu (Siteyi kasıtlı olarak boz)</label>
    </div>

    <div id="loader" class="loader">
        ⏳ visionBird hedefi tarıyor ve analiz ediyor, lütfen bekleyin...
    </div>

    <div id="resultBox" class="result-container">
        <h2 style="color: #4ade80;">✅ Analiz Tamamlandı!</h2>
        <h3 style="color: #38bdf8; margin-top: 2rem;">📋 Yapay Zeka Hata Raporu:</h3>
        <div id="reportBox" class="report-text"></div>
    </div>

    <script>
        // Enter tuşuna basılıp basılmadığını kontrol eden fonksiyon
        function checkEnter(event) {
            if (event.key === "Enter") {
                havalandir();
            }
        }

        async function havalandir() {
            const url = document.getElementById('urlInput').value;
            const isSimulated = document.getElementById('simSwitch').checked;

            if(!url) return alert("Lütfen bir URL girin!");

            const btn = document.getElementById('scanBtn');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            const reportBox = document.getElementById('reportBox');

            btn.disabled = true;
            resultBox.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch('http://127.0.0.1:8000/api/tara', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        url: url,
                        hata_simulasyonu: isSimulated 
                    })
                });

                const data = await response.json();
                
                if(data.durum === "basarili") {
                    reportBox.textContent = data.yapay_zeka_raporu;
                    resultBox.style.display = 'block';
                } else {
                    alert("Bir hata oluştu!");
                }
            } catch (error) {
                alert("Sunucuya bağlanılamadı. API açık mı?");
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>

</body>
</html>
